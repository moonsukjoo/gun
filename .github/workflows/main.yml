name: Build Android APK (Final Fix v3)

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Dependencies
        run: |
          # 버전 충돌 방지 및 누락된 부품(react-is) 포함 설치
          npm install --legacy-peer-deps
          npm install react-is --legacy-peer-deps
          npm install @capacitor/core @capacitor/cli @capacitor/android --legacy-peer-deps

      - name: Build Web Project
        run: npm run build

      - name: Capacitor Init
        # 에러가 났던 --confirm 옵션을 제거했습니다.
        run: npx cap init "GeonmyeongHRM" "com.geonmyeong.hrm" --web-dir dist

      - name: Add Android Platform
        run: npx cap add android

      - name: Copy Web to Android
        run: npx cap copy android

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build APK
        run: |
          cd android
          # 빌드 권한 부여 및 실행
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Geonmyeong-HRM-APK
          path: android/app/build/outputs/apk/release/app-release-unsigned.apk
