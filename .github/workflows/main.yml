name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 소스 코드 가져오기
        uses: actions/checkout@v4

      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 패키지 설치 및 react-is 에러 해결
        run: |
          npm install
          npm install react-is

      - name: 웹 프로젝트 빌드
        run: npm run build

      - name: Capacitor 안드로이드 동기화
        run: npx cap sync android

      - name: Java 설정 (자바 21 버전)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: 안드로이드 APK 빌드
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: 완성된 APK 업로드
        uses: actions/upload-artifact@v4
        with:
          name: gun-app-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
