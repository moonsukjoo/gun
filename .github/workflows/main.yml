name: Build Android APK (건명)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: 의존성 패키지 설치
        run: |
          npm install
          npm install @capacitor/cli @capacitor/core @capacitor/android @capacitor/assets

      - name: 웹 프로젝트 빌드
        run: npm run build

      - name: 빌드 폴더 정리
        run: |
          mkdir -p dist
          cp -r out/* dist/ 2>/dev/null || true
          cp -r build/* dist/ 2>/dev/null || true

      - name: Capacitor 초기화 및 앱 이름 지정
        run: |
          npx cap init "건명" "com.gun.app" --web-dir dist || true
          npx cap add android || true

      - name: 앱 아이콘 생성
        run: |
          mkdir -p assets
          cp public/company_logo.png assets/icon.png
          npx @capacitor/assets generate --android

      - name: Capacitor 싱크
        run: npx cap sync android

      - name: Java 설정
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: 안드로이드 APK 빌드
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace

      - name: 완성된 APK 업로드
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: gun-app-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
